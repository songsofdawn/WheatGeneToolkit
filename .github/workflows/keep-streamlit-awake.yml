name: Keep Streamlit App Awake

on:
  schedule:
    # GitHub Actions uses UTC time.
    # Run every 4 hours, then run a backup attempt 30 minutes later.
    - cron: "17 */4 * * *"
    - cron: "47 */4 * * *"

  workflow_dispatch:

concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Install Playwright
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Wake or keep Streamlit app alive
        shell: bash
        env:
          APP_URL: "https://wheatgenesoperation-96yfkzyzehlld67vb4vd3c.streamlit.app"
        run: |
          cat > wake_streamlit.py <<'PY'
          import os
          import sys
          import time

          from playwright.sync_api import TimeoutError as PlaywrightTimeoutError
          from playwright.sync_api import sync_playwright


          APP_URL = os.environ["APP_URL"].rstrip("/")
          HEALTH_URL = f"{APP_URL}/_stcore/health"

          SLEEP_KEYWORDS = [
              "This app has gone to sleep",
              "has gone to sleep",
              "Yes, get this app back up",
              "Get this app back up",
              "Zzzz",
          ]

          WAKING_KEYWORDS = [
              "Your app is waking up",
              "This will take just a sec",
          ]

          ERROR_KEYWORDS = [
              "Oh no",
              "Error running your app",
              "resource limits",
              "ModuleNotFoundError",
              "Traceback",
          ]


          def log(message):
              print(message, flush=True)


          def contains_any(text, keywords):
              text_lower = text.lower()
              return any(keyword.lower() in text_lower for keyword in keywords)


          def get_body_text(page, timeout=30000):
              try:
                  return page.locator("body").inner_text(timeout=timeout)
              except Exception as exc:
                  log(f"[WARN] Failed to read body text: {exc}")
                  return ""


          def print_preview(text, title="Page text preview", limit=1500):
              log("")
              log("=" * 60)
              log(title)
              log("=" * 60)
              log(text[:limit] if text else "[empty body text]")
              log("=" * 60)
              log("")


          def safe_keepalive_interaction(page):
              """Use harmless interactions so app widgets are not triggered."""
              log("[INFO] App does not look asleep. Running safe keepalive interactions...")

              try:
                  page.mouse.move(200, 200)
                  time.sleep(1)
                  page.mouse.move(500, 400)
                  time.sleep(1)
              except Exception as exc:
                  log(f"[WARN] Mouse move failed: {exc}")

              try:
                  page.locator("body").click(position={"x": 20, "y": 20}, timeout=10000)
                  log("[INFO] Clicked body area safely.")
              except Exception as exc:
                  log(f"[WARN] Body click failed: {exc}")

              try:
                  page.mouse.wheel(0, 800)
                  time.sleep(1)
                  page.mouse.wheel(0, -400)
                  time.sleep(1)
                  log("[INFO] Scrolled page safely.")
              except Exception as exc:
                  log(f"[WARN] Scroll failed: {exc}")

              time.sleep(10)


          def try_click_wake_button(page):
              log("[INFO] Trying to click Streamlit wake-up button...")

              for text in ["Yes, get this app back up", "Get this app back up", "Wake up", "wake"]:
                  try:
                      locator = page.get_by_text(text, exact=False)
                      if locator.count() > 0:
                          locator.first.click(timeout=30000)
                          log(f"[INFO] Clicked wake button by text: {text}")
                          return True
                  except Exception as exc:
                      log(f"[WARN] Failed wake-button candidate '{text}': {exc}")

              try:
                  buttons = page.locator("button")
                  count = buttons.count()
                  log(f"[INFO] Found {count} button(s) on page.")

                  for index in range(count):
                      button = buttons.nth(index)
                      button_text = button.inner_text(timeout=5000)
                      log(f"[INFO] Button {index}: {button_text}")

                      if "get this app back up" in button_text.lower() or "wake" in button_text.lower():
                          button.click(timeout=30000)
                          log(f"[INFO] Clicked wake button index: {index}")
                          return True
              except Exception as exc:
                  log(f"[WARN] Button fallback failed: {exc}")

              return False


          def check_health(page):
              log(f"[INFO] Checking health endpoint: {HEALTH_URL}")

              try:
                  response = page.goto(HEALTH_URL, wait_until="domcontentloaded", timeout=120000)
                  status = response.status if response else None
                  text = get_body_text(page, timeout=15000)

                  log(f"[INFO] Health HTTP status: {status}")
                  print_preview(text, title="Health endpoint preview", limit=500)

                  return bool(status and 200 <= status < 400)
              except Exception as exc:
                  log(f"[WARN] Health check failed: {exc}")
                  return False


          def open_homepage(page):
              url = f"{APP_URL}/?keepalive={int(time.time())}"
              response = page.goto(url, wait_until="domcontentloaded", timeout=180000)
              status = response.status if response else None
              log(f"[INFO] Initial HTTP status: {status}")
              log(f"[INFO] Current URL after navigation: {page.url}")
              time.sleep(15)
              return get_body_text(page)


          with sync_playwright() as playwright:
              browser = playwright.chromium.launch(
                  headless=True,
                  args=["--no-sandbox", "--disable-dev-shm-usage"],
              )
              context = browser.new_context(
                  user_agent=(
                      "Mozilla/5.0 (X11; Linux x86_64) "
                      "AppleWebKit/537.36 (KHTML, like Gecko) "
                      "Chrome/120.0.0.0 Safari/537.36"
                  ),
                  viewport={"width": 1365, "height": 900},
              )
              page = context.new_page()

              try:
                  log("=" * 60)
                  log(f"[INFO] Opening Streamlit app: {APP_URL}")
                  log("=" * 60)

                  text = open_homepage(page)
                  print_preview(text, title="Initial page text preview")

                  if contains_any(text, ERROR_KEYWORDS):
                      log("[ERROR] Streamlit error page detected.")
                      sys.exit(1)

                  if contains_any(text, SLEEP_KEYWORDS) or contains_any(text, WAKING_KEYWORDS):
                      log("[INFO] Detected Streamlit sleeping page.")

                      if contains_any(text, SLEEP_KEYWORDS):
                          if not try_click_wake_button(page):
                              log("[ERROR] Sleeping page detected, but wake button was not clicked.")
                              sys.exit(1)

                          log("[INFO] Wake button clicked. Waiting for app to start...")
                      else:
                          log("[INFO] App is already waking up. Waiting for app to start...")


                      for seconds in [30, 30, 30, 30]:
                          time.sleep(seconds)
                          log(f"[INFO] Waited another {seconds} seconds. Checking page...")

                          try:
                              page.reload(wait_until="domcontentloaded", timeout=120000)
                              time.sleep(10)
                          except Exception as exc:
                              log(f"[WARN] Reload during wake check failed: {exc}")

                          text = get_body_text(page)
                          print_preview(text, title="Page text after wake attempt", limit=1000)

                          if contains_any(text, ERROR_KEYWORDS):
                              log("[ERROR] Error page detected after wake attempt.")
                              sys.exit(1)

                          if not contains_any(text, SLEEP_KEYWORDS) and not contains_any(text, WAKING_KEYWORDS):
                              log("[INFO] App no longer looks asleep or waking up.")
                              break

                      final_text = get_body_text(page)

                      if contains_any(final_text, SLEEP_KEYWORDS) or contains_any(final_text, WAKING_KEYWORDS):
                          log("[ERROR] App still appears to be asleep or waking up after wait attempts.")
                          sys.exit(1)

                  else:
                      log("[INFO] App does not look asleep.")

                  safe_keepalive_interaction(page)

                  if not check_health(page):
                      log("[WARN] Health endpoint did not clearly return OK.")
                      log("[INFO] Re-opening homepage for final check...")

                      page.goto(APP_URL, wait_until="domcontentloaded", timeout=120000)
                      time.sleep(10)
                      final_text = get_body_text(page)
                      print_preview(final_text, title="Final homepage preview", limit=1200)

                      if contains_any(final_text, SLEEP_KEYWORDS) or contains_any(final_text, WAKING_KEYWORDS):
                          log("[ERROR] Final check: app is sleeping or still waking up.")
                          sys.exit(1)

                      if contains_any(final_text, ERROR_KEYWORDS):
                          log("[ERROR] Final check: app error detected.")
                          sys.exit(1)

                  log("[SUCCESS] Streamlit app wake/keepalive process finished successfully.")
                  sys.exit(0)

              except PlaywrightTimeoutError as exc:
                  log(f"[ERROR] Playwright timeout: {exc}")
                  sys.exit(1)

              except Exception as exc:
                  log(f"[ERROR] Unexpected error: {exc}")
                  sys.exit(1)

              finally:
                  browser.close()
          PY

          python wake_streamlit.py
